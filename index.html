<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Chat</title>
    <style>
        /*
         * OpenClaw Kindle 聊天面板
         * 
         * 【使用前配置】
         * 需要先在 Gateway 配置中启用 Chat Completions API:
         * 
         * 在 ~/.openclaw/config 中添加:
         * gateway: {
         *   http: {
         *     endpoints: {
         *       chatCompletions: { enabled: true }
         *     }
         *   }
         * }
         * 
         * 或者运行: openclaw config patch '{\"gateway\":{\"http\":{\"endpoints\":{\"chatCompletions\":{\"enabled\":true}}}}}'
         * 
         * 【部署说明】
         * 1. 将此文件放到 HTTP 服务器（或本地直接打开）
         * 2. 填写 Gateway 地址（HTTP 端口，同 WebSocket 端口）
         * 3. 如有 Token 认证，填写 Gateway Token
         * 4. 在 Kindle 浏览器中访问
         */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.5;
            background: #ffffff;
            color: #000000;
            padding: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000;
        }
        
        /* 连接表单 */
        .config-form {
            background: #f5f5f5;
            padding: 15px;
            border: 1px solid #000;
            margin-bottom: 15px;
        }
        
        .config-form label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .config-form input[type="text"],
        .config-form input[type="password"],
        .config-form select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            border: 1px solid #000;
            margin-bottom: 12px;
            background: #fff;
            -webkit-appearance: none;
        }
        
        .config-form .hint {
            font-size: 12px;
            color: #666;
            margin-top: -8px;
            margin-bottom: 12px;
        }
        
        /* 状态栏 */
        .status-bar {
            padding: 8px 12px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #000;
            background: #f5f5f5;
        }
        
        .status-ok { background: #fff; }
        .status-error { background: #fdd; }
        .status-loading { background: #ff9; }
        
        /* 消息容器 */
        .messages {
            height: 55vh;
            overflow-y: scroll;
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 15px;
            background: #fff;
        }
        
        /* 消息 */
        .msg {
            margin-bottom: 15px;
            padding: 10px;
            border-left: 3px solid #000;
        }
        
        .msg-user {
            background: #f0f0f0;
            border-left-color: #000;
        }
        
        .msg-assistant {
            background: #fff;
            border-left-color: #666;
        }
        
        .msg-sender {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #333;
        }
        
        .msg-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .msg-system {
            background: #f9f9f9;
            border-left-color: #999;
            font-style: italic;
            color: #666;
        }
        
        /* 输入区域 */
        .input-area textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            font-size: 16px;
            font-family: Georgia, serif;
            border: 1px solid #000;
            resize: none;
            margin-bottom: 10px;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Georgia, serif;
            border: 2px solid #000;
            cursor: pointer;
            background: #000;
            color: #fff;
            -webkit-appearance: none;
        }
        
        .btn:active { background: #333; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        
        .btn-full { display: block; width: 100%; }
        
        .btn-outline {
            background: #fff;
            color: #000;
        }
        
        .btn-outline:active { background: #f0f0f0; }
        
        /* 隐藏 */
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>OpenClaw Chat</h1>
    
    <!-- 配置区域 -->
    <div id="configArea" class="config-form">
        <label>Gateway HTTP 地址:</label>
        <input type="text" id="gatewayUrl" value="http://127.0.0.1:7860" placeholder="http://IP:PORT">
        <div class="hint">Gateway 的 HTTP 端口（同 WS 端口）</div>
        
        <label>Gateway Token:</label>
        <input type="password" id="gatewayToken" placeholder="留空表示无认证">
        <div class="hint">如有设置 gateway.auth.token 则填写</div>
        
        <label>Agent ID:</label>
        <input type="text" id="agentId" value="main" placeholder="main">
        <div class="hint">OpenClaw agent id，默认 main</div>
        
        <label>同步 Session Key (可选):</label>
        <input type="text" id="syncSessionKey" placeholder="如 agent:main:main">
        <div class="hint">填入后可从服务端同步该 session 的历史</div>
        
        <button class="btn btn-full" onclick="saveConfig()">保存配置</button>
        <button class="btn btn-full btn-outline" onclick="syncFromServer()" style="margin-top:8px">从服务端同步历史</button>
    </div>
    
    <!-- 状态栏 -->
    <div id="statusBar" class="status-bar status-ok">就绪</div>
    
    <!-- 消息区域 -->
    <div id="messages" class="messages"></div>
    
    <!-- 输入区域 -->
    <div class="input-area">
        <textarea id="inputText" placeholder="输入消息... (Ctrl+Enter 发送)" onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" class="btn btn-full" onclick="sendMessage()">发送</button>
        <button class="btn btn-full btn-outline" onclick="clearHistory()" style="margin-top:8px">清除历史</button>
    </div>

    <script>
        // ============ 配置 ============
        var gatewayUrl = 'http://127.0.0.1:7860';
        var gatewayToken = '';
        var agentId = 'main';
        
        // ============ 状态 ============
        var isSending = false;
        var messages = [];
        
        // ============ DOM ============
        var statusEl = document.getElementById('statusBar');
        var messagesEl = document.getElementById('messages');
        var inputEl = document.getElementById('inputText');
        var sendBtn = document.getElementById('sendBtn');
        
        // ============ 初始化 ============
        function loadConfig() {
            try {
                var url = localStorage.getItem('oc_gateway_url');
                var token = localStorage.getItem('oc_gateway_token');
                var agent = localStorage.getItem('oc_agent_id');
                var syncKey = localStorage.getItem('oc_sync_session_key');
                
                if (url) {
                    gatewayUrl = url;
                    document.getElementById('gatewayUrl').value = url;
                }
                if (token) {
                    gatewayToken = token;
                    document.getElementById('gatewayToken').value = token;
                }
                if (agent) {
                    agentId = agent;
                    document.getElementById('agentId').value = agent;
                }
                if (syncKey) {
                    document.getElementById('syncSessionKey').value = syncKey;
                }
            } catch(e) {}
        }
        
        function saveConfig() {
            try {
                gatewayUrl = document.getElementById('gatewayUrl').value.trim() || 'http://127.0.0.1:7860';
                gatewayToken = document.getElementById('gatewayToken').value.trim();
                agentId = document.getElementById('agentId').value.trim() || 'main';
                var syncKey = document.getElementById('syncSessionKey').value.trim();
                
                localStorage.setItem('oc_gateway_url', gatewayUrl);
                localStorage.setItem('oc_gateway_token', gatewayToken);
                localStorage.setItem('oc_agent_id', agentId);
                localStorage.setItem('oc_sync_session_key', syncKey);
                
                setStatus('ok', '配置已保存');
            } catch(e) {
                setStatus('error', '保存失败: ' + e.message);
            }
        }
        
        function setStatus(type, text) {
            statusEl.textContent = text;
            statusEl.className = 'status-bar status-' + type;
        }
        
        // ============ 消息显示 ============
        function addMessage(role, content) {
            messages.push({role: role, content: content});
            saveHistory();
            renderMessage(role, content);
        }
        
        function renderMessage(role, content) {
            var div = document.createElement('div');
            div.className = 'msg msg-' + role;
            
            var senderDiv = document.createElement('div');
            senderDiv.className = 'msg-sender';
            senderDiv.textContent = role === 'user' ? '你' : (role === 'assistant' ? 'AI' : '系统');
            
            var contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            contentDiv.textContent = content;
            
            div.appendChild(senderDiv);
            div.appendChild(contentDiv);
            messagesEl.appendChild(div);
            
            // 滚动到底部
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        function renderAllMessages() {
            messagesEl.innerHTML = '';
            for (var i = 0; i < messages.length; i++) {
                renderMessage(messages[i].role, messages[i].content);
            }
        }
        
        function saveHistory() {
            try {
                localStorage.setItem('oc_messages', JSON.stringify(messages));
            } catch(e) {}
        }
        
        function loadHistory() {
            try {
                var saved = localStorage.getItem('oc_messages');
                if (saved) {
                    messages = JSON.parse(saved);
                    renderAllMessages();
                }
            } catch(e) {
                messages = [];
            }
        }
        
        function clearHistory() {
            if (confirm('确定清除所有聊天记录？')) {
                messages = [];
                saveHistory();
                messagesEl.innerHTML = '';
            }
        }
        
        // ============ 从服务端同步历史 ============
        function syncFromServer() {
            var sessionKey = document.getElementById('syncSessionKey').value.trim();
            if (!sessionKey) {
                alert('请先填写要同步的 Session Key');
                return;
            }
            
            setStatus('loading', '正在同步历史...');
            
            var apiUrl = gatewayUrl.replace(/\/$/, '') + '/tools/invoke';
            
            var body = {
                tool: 'sessions_history',
                args: {
                    sessionKey: sessionKey,
                    limit: 100
                }
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', apiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            if (gatewayToken) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + gatewayToken);
            }
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            if (resp.ok && resp.result && resp.result.messages) {
                                var serverMsgs = resp.result.messages;
                                messages = [];
                                
                                for (var i = 0; i < serverMsgs.length; i++) {
                                    var msg = serverMsgs[i];
                                    var role = msg.role;
                                    var content = '';
                                    
                                    // 提取文本内容
                                    if (typeof msg.content === 'string') {
                                        content = msg.content;
                                    } else if (msg.content && msg.content.length) {
                                        for (var j = 0; j < msg.content.length; j++) {
                                            var block = msg.content[j];
                                            if (block.type === 'text' && block.text) {
                                                content += block.text;
                                            } else if (block.type === 'toolCall') {
                                                content += '[调用工具: ' + block.name + ']\n';
                                            } else if (block.type === 'thinking') {
                                                // 跳过 thinking 块
                                            }
                                        }
                                    }
                                    
                                    if (content && content.trim()) {
                                        messages.push({role: role, content: content.trim()});
                                    }
                                }
                                
                                saveHistory();
                                renderAllMessages();
                                setStatus('ok', '已同步 ' + messages.length + ' 条消息');
                            } else {
                                setStatus('error', '同步失败: 无效响应');
                            }
                        } catch(e) {
                            setStatus('error', '同步失败: ' + e.message);
                        }
                    } else {
                        var errText = '同步失败 (' + xhr.status + ')';
                        try {
                            var errJson = JSON.parse(xhr.responseText);
                            if (errJson.error) {
                                errText = errJson.error.message || errJson.error.type || JSON.stringify(errJson.error);
                            }
                        } catch(e) {}
                        setStatus('error', errText);
                    }
                }
            };
            
            xhr.onerror = function() {
                setStatus('error', '网络错误');
            };
            
            try {
                xhr.send(JSON.stringify(body));
            } catch(e) {
                setStatus('error', '请求失败: ' + e.message);
            }
        }
        
        function addSystemMsg(text) {
            var div = document.createElement('div');
            div.className = 'msg msg-system';
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        // ============ 发送消息 ============
        function sendMessage() {
            if (isSending) return;
            
            var text = inputEl.value.trim();
            if (!text) return;
            
            // 显示用户消息
            addMessage('user', text);
            inputEl.value = '';
            
            // 构建请求
            var apiUrl = gatewayUrl.replace(/\/$/, '') + '/v1/chat/completions';
            
            var body = {
                model: 'openclaw:' + agentId,
                messages: messages.slice(), // 发送完整历史
                stream: false
            };
            
            isSending = true;
            sendBtn.disabled = true;
            setStatus('loading', '等待回复...');
            
            // 发送请求
            var xhr = new XMLHttpRequest();
            xhr.open('POST', apiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            if (gatewayToken) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + gatewayToken);
            }
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    isSending = false;
                    sendBtn.disabled = false;
                    
                    if (xhr.status === 200) {
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            var content = resp.choices && resp.choices[0] && resp.choices[0].message && resp.choices[0].message.content;
                            if (content) {
                                addMessage('assistant', content);
                                setStatus('ok', '就绪');
                            } else {
                                addSystemMsg('收到空响应');
                                setStatus('error', '空响应');
                            }
                        } catch(e) {
                            addSystemMsg('解析响应失败: ' + e.message);
                            setStatus('error', '解析失败');
                        }
                    } else {
                        var errText = '请求失败 (' + xhr.status + ')';
                        try {
                            var errJson = JSON.parse(xhr.responseText);
                            if (errJson.error && errJson.error.message) {
                                errText = errJson.error.message;
                            }
                        } catch(e) {}
                        addSystemMsg(errText);
                        setStatus('error', errText);
                    }
                }
            };
            
            xhr.onerror = function() {
                isSending = false;
                sendBtn.disabled = false;
                addSystemMsg('网络错误，无法连接 Gateway');
                setStatus('error', '网络错误');
            };
            
            try {
                xhr.send(JSON.stringify(body));
            } catch(e) {
                isSending = false;
                sendBtn.disabled = false;
                addSystemMsg('发送失败: ' + e.message);
                setStatus('error', '发送失败');
            }
        }
        
        function handleKey(e) {
            if (e.keyCode === 13 && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // ============ 启动 ============
        loadConfig();
        loadHistory();
        inputEl.focus();
    </script>
</body>
</html>
