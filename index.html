<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Chat</title>
    <style>
        /*
         * OpenClaw Kindle 聊天面板
         * 
         * 【使用前配置】
         * 需要先在 Gateway 配置中启用 Chat Completions API:
         * 
         * 在 ~/.openclaw/config 中添加:
         * gateway: {
         *   http: {
         *     endpoints: {
         *       chatCompletions: { enabled: true }
         *     }
         *   }
         * }
         * 
         * 或者运行: openclaw config patch '{\"gateway\":{\"http\":{\"endpoints\":{\"chatCompletions\":{\"enabled\":true}}}}}'
         * 
         * 【部署说明】
         * 1. 将此文件放到 HTTP 服务器（或本地直接打开）
         * 2. 填写 Gateway 地址（HTTP 端口，同 WebSocket 端口）
         * 3. 如有 Token 认证，填写 Gateway Token
         * 4. 在 Kindle 浏览器中访问
         */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.5;
            background: #ffffff;
            color: #000000;
            padding: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000;
        }
        
        /* 连接表单 */
        .config-form {
            background: #f5f5f5;
            padding: 15px;
            border: 1px solid #000;
            margin-bottom: 15px;
        }
        
        .config-form label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .config-form input[type="text"],
        .config-form input[type="password"],
        .config-form select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            border: 1px solid #000;
            margin-bottom: 12px;
            background: #fff;
            -webkit-appearance: none;
        }
        
        .config-form .hint {
            font-size: 12px;
            color: #666;
            margin-top: -8px;
            margin-bottom: 12px;
        }
        
        /* 状态栏 */
        .status-bar {
            padding: 8px 12px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #000;
            background: #f5f5f5;
        }
        
        .status-ok { background: #fff; }
        .status-error { background: #fdd; }
        .status-loading { background: #ff9; }
        
        /* 消息容器 */
        .messages {
            height: 55vh;
            overflow-y: scroll;
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 15px;
            background: #fff;
        }
        
        /* 消息 */
        .msg {
            margin-bottom: 15px;
            padding: 10px;
            border-left: 3px solid #000;
        }
        
        .msg-user {
            background: #f0f0f0;
            border-left-color: #000;
        }
        
        .msg-assistant {
            background: #fff;
            border-left-color: #666;
        }
        
        .msg-sender {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #333;
        }
        
        .msg-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Markdown 样式 */
        .msg-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .msg-content pre {
            background: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid #ddd;
        }

        .msg-content pre code {
            background: none;
            padding: 0;
        }

        .msg-content strong {
            font-weight: bold;
        }

        .msg-content em {
            font-style: italic;
        }

        .msg-content a {
            color: #000;
            text-decoration: underline;
        }

        .msg-content ul, .msg-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .msg-content li {
            margin: 4px 0;
        }

        .msg-content blockquote {
            border-left: 3px solid #999;
            padding-left: 10px;
            margin: 8px 0;
            color: #666;
        }

        /* 流式光标 */
        .streaming-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #000;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .msg-system {
            background: #f9f9f9;
            border-left-color: #999;
            font-style: italic;
            color: #666;
        }
        
        /* 输入区域 */
        .input-area textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            font-size: 16px;
            font-family: Georgia, serif;
            border: 1px solid #000;
            resize: none;
            margin-bottom: 10px;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Georgia, serif;
            border: 2px solid #000;
            cursor: pointer;
            background: #000;
            color: #fff;
            -webkit-appearance: none;
        }
        
        .btn:active { background: #333; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        
        .btn-full { display: block; width: 100%; }
        
        .btn-outline {
            background: #fff;
            color: #000;
        }
        
        .btn-outline:active { background: #f0f0f0; }
        
        /* 隐藏 */
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>OpenClaw Chat</h1>
    
    <!-- 配置切换按钮 -->
    <button id="configToggle" class="btn btn-full btn-outline" onclick="toggleConfig()" style="margin-bottom:15px">⚙️ 配置 ▾</button>
    
    <!-- 配置区域 -->
    <div id="configArea" class="config-form hidden">
        <label>Gateway HTTP 地址:</label>
        <input type="text" id="gatewayUrl" value="" placeholder="留空使用本地代理">
        <div class="hint">留空即可（通过代理访问 Gateway）</div>
        
        <label>Gateway Token:</label>
        <input type="password" id="gatewayToken" placeholder="留空表示无认证">
        <div class="hint">如有设置 gateway.auth.token 则填写</div>
        
        <label>Agent ID:</label>
        <input type="text" id="agentId" value="main" placeholder="main">
        <div class="hint">OpenClaw agent id，默认 main</div>
        
        <label>同步 Session Key (可选):</label>
        <input type="text" id="syncSessionKey" placeholder="如 agent:main:main">
        <div class="hint">填入后可从服务端同步该 session 的历史</div>
        
        <button class="btn btn-full" onclick="saveConfig()">保存配置</button>
        <button class="btn btn-full btn-outline" onclick="syncFromServer()" style="margin-top:8px">从服务端同步历史</button>
    </div>
    
    <!-- 状态栏 -->
    <div id="statusBar" class="status-bar status-ok">就绪</div>
    
    <!-- 消息区域 -->
    <div id="messages" class="messages"></div>
    
    <!-- 输入区域 -->
    <div class="input-area">
        <textarea id="inputText" placeholder="输入消息... (Ctrl+Enter 发送)" onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" class="btn btn-full" onclick="sendMessage()">发送</button>
        <button class="btn btn-full btn-outline" onclick="clearHistory()" style="margin-top:8px">清除历史</button>
    </div>

    <script>
        // ============ 配置 ============
        var gatewayUrl = '';  // 空则使用当前 origin（通过代理）
        var gatewayToken = '';
        var agentId = 'main';
        
        // ============ 状态 ============
        var isSending = false;
        var messages = [];
        var lastFailedRequest = null;  // 保存失败请求用于重试
        var autoRetryCount = 0;  // 自动重试计数
        var maxAutoRetries = 2;  // 最多自动重试次数（共3次请求）
        
        // ============ 工具函数 ============
        function getGatewayUrl() {
            if (gatewayUrl && gatewayUrl.trim()) {
                return gatewayUrl.replace(/\/$/, '');
            }
            // 使用当前页面的 origin（代理模式）
            return window.location.origin;
        }
        
        // ============ DOM ============
        var statusEl = document.getElementById('statusBar');
        var messagesEl = document.getElementById('messages');
        var inputEl = document.getElementById('inputText');
        var sendBtn = document.getElementById('sendBtn');
        
        // ============ 初始化 ============
        function toggleConfig() {
            var area = document.getElementById('configArea');
            var btn = document.getElementById('configToggle');
            if (area.classList.contains('hidden')) {
                area.classList.remove('hidden');
                btn.textContent = '⚙️ 配置 ▴';
            } else {
                area.classList.add('hidden');
                btn.textContent = '⚙️ 配置 ▾';
            }
        }
        
        function loadConfig() {
            try {
                var url = localStorage.getItem('oc_gateway_url');
                var token = localStorage.getItem('oc_gateway_token');
                var agent = localStorage.getItem('oc_agent_id');
                var syncKey = localStorage.getItem('oc_sync_session_key');
                
                if (url) {
                    gatewayUrl = url;
                    document.getElementById('gatewayUrl').value = url;
                }
                if (token) {
                    gatewayToken = token;
                    document.getElementById('gatewayToken').value = token;
                }
                if (agent) {
                    agentId = agent;
                    document.getElementById('agentId').value = agent;
                }
                if (syncKey) {
                    document.getElementById('syncSessionKey').value = syncKey;
                }
            } catch(e) {}
        }
        
        function saveConfig() {
            try {
                gatewayUrl = document.getElementById('gatewayUrl').value.trim();  // 可以为空
                gatewayToken = document.getElementById('gatewayToken').value.trim();
                agentId = document.getElementById('agentId').value.trim() || 'main';
                var syncKey = document.getElementById('syncSessionKey').value.trim();
                
                localStorage.setItem('oc_gateway_url', gatewayUrl);
                localStorage.setItem('oc_gateway_token', gatewayToken);
                localStorage.setItem('oc_agent_id', agentId);
                localStorage.setItem('oc_sync_session_key', syncKey);
                
                // 保存后自动收起配置
                var area = document.getElementById('configArea');
                var btn = document.getElementById('configToggle');
                area.classList.add('hidden');
                btn.textContent = '⚙️ 配置 ▾';
                
                setStatus('ok', '配置已保存');
            } catch(e) {
                setStatus('error', '保存失败: ' + e.message);
            }
        }
        
        function setStatus(type, text) {
            statusEl.textContent = text;
            statusEl.className = 'status-bar status-' + type;
        }
        
        // ============ Markdown 渲染 ============
        function renderMarkdown(text) {
            if (!text) return '';
            
            // 转义 HTML
            var html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // 代码块 ```code```
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });
            
            // 行内代码 `code`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // 粗体 **text**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // 斜体 *text*
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // 链接 [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // 引用 > text
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // 无序列表 - item
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // 有序列表 1. item
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            return html;
        }
        
        // ============ 消息显示 ============
        function addMessage(role, content) {
            messages.push({role: role, content: content});
            saveHistory();
            renderMessage(role, content);
        }
        
        function renderMessage(role, content, isStreaming) {
            isStreaming = isStreaming || false;
            
            var div = document.createElement('div');
            div.className = 'msg msg-' + role;
            
            var senderDiv = document.createElement('div');
            senderDiv.className = 'msg-sender';
            senderDiv.textContent = role === 'user' ? '你' : (role === 'assistant' ? 'AI' : '系统');
            
            var contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            
            // 使用 innerHTML 渲染 Markdown
            contentDiv.innerHTML = renderMarkdown(content);
            
            // 流式时添加光标
            if (isStreaming) {
                var cursor = document.createElement('span');
                cursor.className = 'streaming-cursor';
                cursor.id = 'streamingCursor';
                contentDiv.appendChild(cursor);
            }
            
            div.appendChild(senderDiv);
            div.appendChild(contentDiv);
            messagesEl.appendChild(div);
            
            // 滚动到底部
            messagesEl.scrollTop = messagesEl.scrollHeight;
            
            return contentDiv;
        }
        
        function updateLastMessage(content) {
            // 更新最后一条 AI 消息
            var lastMsg = messagesEl.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('msg-assistant')) {
                var contentDiv = lastMsg.querySelector('.msg-content');
                if (contentDiv) {
                    contentDiv.innerHTML = renderMarkdown(content);
                    // 重新添加光标
                    var cursor = document.createElement('span');
                    cursor.className = 'streaming-cursor';
                    cursor.id = 'streamingCursor';
                    contentDiv.appendChild(cursor);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            }
        }
        
        function finishStreaming() {
            var cursor = document.getElementById('streamingCursor');
            if (cursor) cursor.remove();
        }
        
        function renderAllMessages() {
            messagesEl.innerHTML = '';
            for (var i = 0; i < messages.length; i++) {
                renderMessage(messages[i].role, messages[i].content);
            }
        }
        
        function saveHistory() {
            try {
                localStorage.setItem('oc_messages', JSON.stringify(messages));
            } catch(e) {}
        }
        
        function loadHistory() {
            try {
                var saved = localStorage.getItem('oc_messages');
                if (saved) {
                    messages = JSON.parse(saved);
                    renderAllMessages();
                }
            } catch(e) {
                messages = [];
            }
        }
        
        function clearHistory() {
            if (confirm('确定清除所有聊天记录？')) {
                messages = [];
                saveHistory();
                messagesEl.innerHTML = '';
            }
        }
        
        // ============ 从服务端同步历史 ============
        function syncFromServer() {
            var sessionKey = document.getElementById('syncSessionKey').value.trim();
            if (!sessionKey) {
                alert('请先填写要同步的 Session Key');
                return;
            }
            
            setStatus('loading', '正在同步历史...');
            
            var apiUrl = getGatewayUrl() + '/tools/invoke';
            
            var body = {
                tool: 'sessions_history',
                args: {
                    sessionKey: sessionKey,
                    limit: 100
                }
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', apiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            if (gatewayToken) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + gatewayToken);
            }
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            if (resp.ok && resp.result && resp.result.messages) {
                                var serverMsgs = resp.result.messages;
                                messages = [];
                                
                                for (var i = 0; i < serverMsgs.length; i++) {
                                    var msg = serverMsgs[i];
                                    var role = msg.role;
                                    var content = '';
                                    
                                    // 提取文本内容
                                    if (typeof msg.content === 'string') {
                                        content = msg.content;
                                    } else if (msg.content && msg.content.length) {
                                        for (var j = 0; j < msg.content.length; j++) {
                                            var block = msg.content[j];
                                            if (block.type === 'text' && block.text) {
                                                content += block.text;
                                            } else if (block.type === 'toolCall') {
                                                content += '[调用工具: ' + block.name + ']\n';
                                            } else if (block.type === 'thinking') {
                                                // 跳过 thinking 块
                                            }
                                        }
                                    }
                                    
                                    if (content && content.trim()) {
                                        messages.push({role: role, content: content.trim()});
                                    }
                                }
                                
                                saveHistory();
                                renderAllMessages();
                                setStatus('ok', '已同步 ' + messages.length + ' 条消息');
                            } else {
                                setStatus('error', '同步失败: 无效响应');
                            }
                        } catch(e) {
                            setStatus('error', '同步失败: ' + e.message);
                        }
                    } else {
                        var errText = '同步失败 (' + xhr.status + ')';
                        try {
                            var errJson = JSON.parse(xhr.responseText);
                            if (errJson.error) {
                                errText = errJson.error.message || errJson.error.type || JSON.stringify(errJson.error);
                            }
                        } catch(e) {}
                        setStatus('error', errText);
                    }
                }
            };
            
            xhr.onerror = function() {
                setStatus('error', '网络错误');
            };
            
            try {
                xhr.send(JSON.stringify(body));
            } catch(e) {
                setStatus('error', '请求失败: ' + e.message);
            }
        }
        
        function addSystemMsg(text, showRetry) {
            var div = document.createElement('div');
            div.className = 'msg msg-system';
            
            var contentSpan = document.createElement('span');
            contentSpan.textContent = text;
            div.appendChild(contentSpan);
            
            // 添加重试按钮
            if (showRetry && lastFailedRequest) {
                var retryBtn = document.createElement('button');
                retryBtn.className = 'btn btn-outline';
                retryBtn.style.cssText = 'margin-left:10px;padding:4px 12px;font-size:14px;';
                retryBtn.textContent = '重试';
                retryBtn.onclick = retryLastRequest;
                div.appendChild(retryBtn);
            }
            
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        // ============ 发送消息 ============
        function sendMessage() {
            if (isSending) return;
            
            var text = inputEl.value.trim();
            if (!text) return;
            
            // 显示用户消息
            addMessage('user', text);
            inputEl.value = '';
            
            // 发送请求（不传消息文本则使用 lastFailedRequest）
            sendRequest(messages.slice());
        }
        
        function sendRequest(msgHistory, isRetry) {
            isRetry = isRetry || false;
            
            // 构建请求
            var apiUrl = getGatewayUrl() + '/v1/chat/completions';
            
            var body = {
                model: 'openclaw:' + agentId,
                messages: msgHistory,
                stream: true  // 启用流式传输
            };
            
            // 保存请求用于重试
            lastFailedRequest = msgHistory.slice();
            
            isSending = true;
            sendBtn.disabled = true;
            
            if (isRetry) {
                setStatus('loading', '重试中... (第' + autoRetryCount + '次)');
            } else {
                autoRetryCount = 0;
                setStatus('loading', '等待回复...');
            }
            
            // 使用 fetch 处理流式响应
            var headers = {'Content-Type': 'application/json'};
            if (gatewayToken) {
                headers['Authorization'] = 'Bearer ' + gatewayToken;
            }
            
            fetch(apiUrl, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(body)
            })
            .then(function(response) {
                if (!response.ok) {
                    // 500 错误自动重试
                    if (response.status >= 500 && response.status < 600 && autoRetryCount < maxAutoRetries) {
                        autoRetryCount++;
                        addSystemMsg('服务器错误 (' + response.status + ')，自动重试中...');
                        setTimeout(function() {
                            sendRequest(lastFailedRequest, true);
                        }, 1500);
                        return null;
                    }
                    throw new Error('HTTP ' + response.status);
                }
                
                // 创建一个空的 AI 消息占位
                renderMessage('assistant', '', true);
                
                setStatus('loading', '接收中...');
                
                // 返回 reader
                return response.body.getReader();
            })
            .then(function(reader) {
                if (!reader) return;
                
                var decoder = new TextDecoder();
                var buffer = '';
                var fullContent = '';
                
                function readChunk() {
                    reader.read().then(function(result) {
                        if (result.done) {
                            // 流结束
                            finishStreaming();
                            messages.push({role: 'assistant', content: fullContent});
                            saveHistory();
                            
                            isSending = false;
                            sendBtn.disabled = false;
                            autoRetryCount = 0;
                            lastFailedRequest = null;
                            setStatus('ok', '就绪');
                            return;
                        }
                        
                        // 解码数据
                        buffer += decoder.decode(result.value, {stream: true});
                        
                        // 按行分割处理 SSE
                        var lines = buffer.split('\n');
                        buffer = lines.pop();  // 保留不完整的行
                        
                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i].trim();
                            if (!line || line === '') continue;
                            
                            // SSE 格式: data: {...}
                            if (line.startsWith('data: ')) {
                                var data = line.substring(6);
                                if (data === '[DONE]') continue;
                                
                                try {
                                    var json = JSON.parse(data);
                                    var delta = json.choices && json.choices[0] && json.choices[0].delta;
                                    if (delta && delta.content) {
                                        fullContent += delta.content;
                                        updateLastMessage(fullContent);
                                    }
                                } catch(e) {
                                    // 忽略解析错误
                                }
                            }
                        }
                        
                        // 继续读取
                        readChunk();
                    });
                }
                
                readChunk();
            })
            .catch(function(error) {
                isSending = false;
                sendBtn.disabled = false;
                
                var errText = error.message || '请求失败';
                if (autoRetryCount >= maxAutoRetries) {
                    errText += ' (已重试' + maxAutoRetries + '次)';
                }
                
                addSystemMsg(errText, true);
                setStatus('error', errText);
            });
        }
        
        // 手动重试
        function retryLastRequest() {
            if (!lastFailedRequest || isSending) return;
            autoRetryCount = 0;
            sendRequest(lastFailedRequest, true);
        }
        
        function handleKey(e) {
            if (e.keyCode === 13 && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // ============ 启动 ============
        loadConfig();
        loadHistory();
        inputEl.focus();
    </script>
</body>
</html>
