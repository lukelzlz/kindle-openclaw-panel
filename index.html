<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Chat</title>
    <style>
        /*
         * OpenClaw Kindle 聊天面板 - WebSocket 版本
         * 
         * 【使用前配置】
         * 确保 Gateway WebSocket 服务已启动（默认端口 7860）
         * 
         * 【部署说明】
         * 1. 将此文件放到 HTTP 服务器（或本地直接打开）
         * 2. 填写 Gateway WebSocket 地址（ws://host:port）
         * 3. 如有 Token 认证，填写 Gateway Token
         * 4. 在 Kindle 浏览器中访问
         */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            line-height: 1.5;
            background: #ffffff;
            color: #000000;
            padding: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000;
        }
        
        /* 连接表单 */
        .config-form {
            background: #f5f5f5;
            padding: 15px;
            border: 1px solid #000;
            margin-bottom: 15px;
        }
        
        .config-form label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .config-form input[type="text"],
        .config-form input[type="password"],
        .config-form select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            border: 1px solid #000;
            margin-bottom: 12px;
            background: #fff;
            -webkit-appearance: none;
        }
        
        .config-form .hint {
            font-size: 12px;
            color: #666;
            margin-top: -8px;
            margin-bottom: 12px;
        }
        
        /* 状态栏 */
        .status-bar {
            padding: 8px 12px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #000;
            background: #f5f5f5;
        }
        
        .status-ok { background: #fff; }
        .status-error { background: #fdd; }
        .status-loading { background: #ff9; }
        .status-connecting { background: #dfd; }
        
        /* 消息容器 */
        .messages {
            height: 55vh;
            overflow-y: scroll;
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 15px;
            background: #fff;
        }
        
        /* 消息 */
        .msg {
            margin-bottom: 15px;
            padding: 10px;
            border-left: 3px solid #000;
        }
        
        .msg-user {
            background: #f0f0f0;
            border-left-color: #000;
        }
        
        .msg-assistant {
            background: #fff;
            border-left-color: #666;
        }
        
        .msg-sender {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #333;
        }
        
        .msg-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Markdown 样式 */
        .msg-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.9em;
        }

        .msg-content pre {
            background: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid #ddd;
        }

        .msg-content pre code {
            background: none;
            padding: 0;
        }

        .msg-content strong {
            font-weight: bold;
        }

        .msg-content em {
            font-style: italic;
        }

        .msg-content a {
            color: #000;
            text-decoration: underline;
        }

        .msg-content ul, .msg-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .msg-content li {
            margin: 4px 0;
        }

        .msg-content blockquote {
            border-left: 3px solid #999;
            padding-left: 10px;
            margin: 8px 0;
            color: #666;
        }

        /* 流式光标 */
        .streaming-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #000;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .msg-system {
            background: #f9f9f9;
            border-left-color: #999;
            font-style: italic;
            color: #666;
        }
        
        /* 输入区域 */
        .input-area textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            font-size: 16px;
            font-family: Georgia, serif;
            border: 1px solid #000;
            resize: none;
            margin-bottom: 10px;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            font-family: Georgia, serif;
            border: 2px solid #000;
            cursor: pointer;
            background: #000;
            color: #fff;
            -webkit-appearance: none;
        }
        
        .btn:active { background: #333; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        
        .btn-full { display: block; width: 100%; }
        
        .btn-outline {
            background: #fff;
            color: #000;
        }
        
        .btn-outline:active { background: #f0f0f0; }
        
        /* 连接状态指示器 */
        .connection-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .connection-status.connected { background: #0a0; }
        .connection-status.disconnected { background: #a00; }
        .connection-status.connecting { background: #fa0; }
        
        /* 隐藏 */
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>OpenClaw Chat</h1>
    
    <!-- 配置切换按钮 -->
    <button id="configToggle" class="btn btn-full btn-outline" onclick="toggleConfig()" style="margin-bottom:15px">⚙️ 配置 ▾</button>
    
    <!-- 配置区域 -->
    <div id="configArea" class="config-form hidden">
        <label>Gateway WebSocket 地址:</label>
        <input type="text" id="wsUrl" value="ws://127.0.0.1:7860" placeholder="ws://host:port">
        <div class="hint">Gateway WebSocket 端口（同 HTTP 端口）</div>
        
        <label>Gateway Token:</label>
        <input type="password" id="gatewayToken" placeholder="留空表示无认证">
        <div class="hint">如有设置 gateway.auth.token 则填写</div>
        
        <label>Session Key:</label>
        <input type="text" id="sessionKey" value="main" placeholder="main">
        <div class="hint">OpenClaw session key，默认 main</div>
        
        <label>Agent ID (用于历史同步):</label>
        <input type="text" id="agentId" value="main" placeholder="main">
        <div class="hint">OpenClaw agent id，用于 /tools/invoke</div>
        
        <label style="display:flex;align-items:center;margin-top:12px">
            <input type="checkbox" id="autoReconnect" checked style="width:auto;margin-right:8px">
            <span>自动重连</span>
        </label>
        <div class="hint">WebSocket 断开时自动尝试重新连接</div>
        
        <button class="btn btn-full" onclick="saveConfig()">保存配置</button>
        <button class="btn btn-full btn-outline" onclick="connectWebSocket()" style="margin-top:8px">连接 WebSocket</button>
        <button class="btn btn-full btn-outline" onclick="loadHistoryFromServer()" style="margin-top:8px">从服务端加载历史</button>
    </div>
    
    <!-- 状态栏 -->
    <div id="statusBar" class="status-bar status-ok">
        <span id="connectionStatus" class="connection-status disconnected"></span>
        <span id="statusText">未连接</span>
    </div>
    
    <!-- 消息区域 -->
    <div id="messages" class="messages"></div>
    
    <!-- 输入区域 -->
    <div class="input-area">
        <textarea id="inputText" placeholder="输入消息... (Ctrl+Enter 发送)" onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" class="btn btn-full" onclick="sendMessage()">发送</button>
        <button class="btn btn-full btn-outline" onclick="clearHistory()" style="margin-top:8px">清除历史</button>
    </div>

    <script>
        // ============ 配置 ============
        var wsUrl = 'ws://127.0.0.1:7860';
        var gatewayToken = '';
        var sessionKey = 'main';
        var agentId = 'main';
        var autoReconnect = true;
        
        // ============ 状态 ============
        var ws = null;
        var isConnected = false;
        var isSending = false;
        var messages = [];
        var requestId = 0;
        var currentRunId = null;
        var pendingRequests = {};  // 等待响应的请求
        var reconnectAttempts = 0;
        var maxReconnectAttempts = 5;
        var reconnectDelay = 2000;
        
        // ============ DOM ============
        var statusEl = document.getElementById('statusBar');
        var statusTextEl = document.getElementById('statusText');
        var connectionStatusEl = document.getElementById('connectionStatus');
        var messagesEl = document.getElementById('messages');
        var inputEl = document.getElementById('inputText');
        var sendBtn = document.getElementById('sendBtn');
        
        // ============ 初始化 ============
        loadConfig();
        loadLocalHistory();
        
        // 页面加载后自动连接
        setTimeout(function() {
            connectWebSocket();
        }, 500);
        
        // ============ 配置管理 ============
        function toggleConfig() {
            var area = document.getElementById('configArea');
            var btn = document.getElementById('configToggle');
            if (area.classList.contains('hidden')) {
                area.classList.remove('hidden');
                btn.textContent = '⚙️ 配置 ▴';
            } else {
                area.classList.add('hidden');
                btn.textContent = '⚙️ 配置 ▾';
            }
        }
        
        function loadConfig() {
            try {
                var url = localStorage.getItem('oc_ws_url');
                var token = localStorage.getItem('oc_gateway_token');
                var sessKey = localStorage.getItem('oc_session_key');
                var agent = localStorage.getItem('oc_agent_id');
                var autoRec = localStorage.getItem('oc_auto_reconnect');
                
                if (url) {
                    wsUrl = url;
                    document.getElementById('wsUrl').value = url;
                }
                if (token) {
                    gatewayToken = token;
                    document.getElementById('gatewayToken').value = token;
                }
                if (sessKey) {
                    sessionKey = sessKey;
                    document.getElementById('sessionKey').value = sessKey;
                }
                if (agent) {
                    agentId = agent;
                    document.getElementById('agentId').value = agent;
                }
                autoReconnect = (autoRec === null) ? true : (autoRec === 'true');
                document.getElementById('autoReconnect').checked = autoReconnect;
            } catch(e) {}
        }
        
        function saveConfig() {
            try {
                wsUrl = document.getElementById('wsUrl').value.trim() || 'ws://127.0.0.1:7860';
                gatewayToken = document.getElementById('gatewayToken').value.trim();
                sessionKey = document.getElementById('sessionKey').value.trim() || 'main';
                agentId = document.getElementById('agentId').value.trim() || 'main';
                autoReconnect = document.getElementById('autoReconnect').checked;
                
                localStorage.setItem('oc_ws_url', wsUrl);
                localStorage.setItem('oc_gateway_token', gatewayToken);
                localStorage.setItem('oc_session_key', sessionKey);
                localStorage.setItem('oc_agent_id', agentId);
                localStorage.setItem('oc_auto_reconnect', autoReconnect.toString());
                
                // 保存后自动收起配置
                var area = document.getElementById('configArea');
                var btn = document.getElementById('configToggle');
                area.classList.add('hidden');
                btn.textContent = '⚙️ 配置 ▾';
                
                setStatus('ok', '配置已保存');
            } catch(e) {
                setStatus('error', '保存失败: ' + e.message);
            }
        }
        
        function setStatus(type, text) {
            statusTextEl.textContent = text;
            statusEl.className = 'status-bar status-' + type;
        }
        
        function updateConnectionStatus(status) {
            connectionStatusEl.className = 'connection-status ' + status;
        }
        
        // ============ WebSocket 连接 ============
        function connectWebSocket() {
            if (ws) {
                try { ws.close(); } catch(e) {}
                ws = null;
            }
            
            isConnected = false;
            updateConnectionStatus('connecting');
            setStatus('connecting', '正在连接...');
            
            try {
                // 检查浏览器是否支持 WebSocket
                if (typeof WebSocket === 'undefined') {
                    setStatus('error', '浏览器不支持 WebSocket');
                    addSystemMsg('❌ 浏览器不支持 WebSocket，请使用支持 WebSocket 的浏览器', false);
                    return;
                }
                
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    console.log('WebSocket connected');
                    updateConnectionStatus('connecting');
                    setStatus('connecting', '正在握手...');
                    
                    // 发送 connect 请求
                    sendConnectRequest();
                };
                
                ws.onmessage = function(event) {
                    try {
                        var data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch(e) {
                        console.error('Failed to parse message:', e);
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket error:', error);
                    setStatus('error', 'WebSocket 错误');
                };
                
                ws.onclose = function(event) {
                    console.log('WebSocket closed:', event.code, event.reason);
                    isConnected = false;
                    updateConnectionStatus('disconnected');
                    
                    if (isSending) {
                        isSending = false;
                        sendBtn.disabled = false;
                        addSystemMsg('⚠️ 连接已断开，请重试', true);
                    }
                    
                    setStatus('error', '连接已断开');
                    
                    // 自动重连
                    if (autoReconnect && reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        setStatus('connecting', '重连中 (' + reconnectAttempts + '/' + maxReconnectAttempts + ')...');
                        setTimeout(function() {
                            connectWebSocket();
                        }, reconnectDelay);
                    }
                };
                
            } catch(e) {
                setStatus('error', '连接失败: ' + e.message);
                updateConnectionStatus('disconnected');
            }
        }
        
        function sendConnectRequest() {
            var req = {
                type: 'req',
                id: 'connect-' + (++requestId),
                method: 'connect',
                params: {
                    minProtocol: 3,
                    maxProtocol: 3,
                    client: {
                        id: 'control-ui',
                        displayName: 'Kindle Panel',
                        version: '1.0.0',
                        platform: 'web',
                        mode: 'operator'
                    },
                    role: 'operator',
                    scopes: ['operator.read', 'operator.write']
                }
            };
            
            if (gatewayToken) {
                req.params.auth = { token: gatewayToken };
            }
            
            pendingRequests[req.id] = {
                type: 'connect',
                timestamp: Date.now()
            };
            
            console.log('[connect]', JSON.stringify(req));
            ws.send(JSON.stringify(req));
        }
        
        // ============ 消息处理 ============
        function handleMessage(data) {
            // 响应
            if (data.type === 'res') {
                handleResponse(data);
            }
            // 事件
            else if (data.type === 'event') {
                handleEvent(data);
            }
        }
        
        function handleResponse(data) {
            var pending = pendingRequests[data.id];
            if (!pending) return;
            
            delete pendingRequests[data.id];
            
            // connect 响应
            if (pending.type === 'connect') {
                if (data.ok) {
                    isConnected = true;
                    reconnectAttempts = 0;
                    updateConnectionStatus('connected');
                    setStatus('ok', '已连接');
                    
                    // 连接成功后加载历史
                    loadHistory();
                } else {
                    var errMsg = data.error ? (data.error.message || JSON.stringify(data.error)) : '连接失败';
                    setStatus('error', '握手失败: ' + errMsg);
                    addSystemMsg('❌ 握手失败: ' + errMsg, false);
                }
            }
            // chat.send 响应
            else if (pending.type === 'chat.send') {
                if (data.ok) {
                    currentRunId = data.payload ? data.payload.runId : null;
                    setStatus('loading', '等待回复...');
                } else {
                    isSending = false;
                    sendBtn.disabled = false;
                    var errMsg = data.error ? (data.error.message || JSON.stringify(data.error)) : '发送失败';
                    setStatus('error', errMsg);
                    // 发送失败时，仍然显示用户消息
                    if (pending.userText) {
                        addMessage('user', pending.userText);
                    }
                    addSystemMsg('❌ 发送失败: ' + errMsg, true);
                }
            }
            // chat.history 响应
            else if (pending.type === 'chat.history') {
                if (data.ok && data.payload && data.payload.messages) {
                    // 合并历史
                    mergeHistory(data.payload.messages);
                    setStatus('ok', '已连接');
                } else {
                    setStatus('ok', '已连接（无历史）');
                }
            }
        }
        
        function handleEvent(data) {
            // chat 事件
            if (data.event === 'chat') {
                handleChatEvent(data.payload);
            }
        }
        
        function handleChatEvent(payload) {
            if (!payload) return;
            
            // 调试日志
            console.log('[chat event]', JSON.stringify(payload).substring(0, 500));
            
            // 检查 runId 是否匹配（宽松检查：如果没有 runId 就不过滤）
            if (currentRunId && payload.runId && payload.runId !== currentRunId) {
                console.log('[runId mismatch] current:', currentRunId, 'event:', payload.runId);
                return;  // 忽略不匹配的 runId
            }
            
            var delta = payload.delta || {};
            
            // 用户消息（来自 chat 事件）
            if (delta.role === 'user' && delta.text) {
                // 检查是否已经显示过这条消息（避免重复）
                var lastMsg = messages[messages.length - 1];
                if (!lastMsg || lastMsg.role !== 'user' || lastMsg.content !== delta.text) {
                    addMessage('user', delta.text);
                }
            }
            
            // 助手文本增量
            if (delta.role === 'assistant' || !delta.role) {
                if (delta.text) {
                    // 找到最后一条 assistant 消息或创建新的
                    var lastMsg = messages[messages.length - 1];
                    if (!lastMsg || lastMsg.role !== 'assistant' || lastMsg.runId !== payload.runId) {
                        // 创建新的 assistant 消息
                        lastMsg = {
                            role: 'assistant',
                            content: '',
                            runId: payload.runId
                        };
                        messages.push(lastMsg);
                        renderMessage('assistant', '', true);
                    }
                    
                    lastMsg.content += delta.text;
                    updateLastMessage(lastMsg.content);
                }
            }
            
            // 完成 - 尝试多种检测方式
            var isDone = payload.done || delta.done || payload.state === 'done' || delta.state === 'done';
            if (isDone) {
                console.log('[chat done]');
                finishStreaming();
                saveLocalHistory();
                isSending = false;
                sendBtn.disabled = false;
                currentRunId = null;
                setStatus('ok', '已连接');
                
                // 清理最后一条消息的 runId（不需要持久化）
                var lastMsg = messages[messages.length - 1];
                if (lastMsg) {
                    delete lastMsg.runId;
                }
            }
            
            // 错误
            if (payload.error || delta.error) {
                var err = payload.error || delta.error;
                console.log('[chat error]', err);
                finishStreaming();
                isSending = false;
                sendBtn.disabled = false;
                currentRunId = null;
                setStatus('error', err.message || '错误');
                addSystemMsg('❌ ' + (err.message || '发生错误'), true);
            }
        }
        
        // ============ 生成 UUID ============
        function generateUUID() {
            // 简单的 UUID v4 实现（兼容旧浏览器）
            var d = Date.now();
            var uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = (d + Math.random() * 16) % 16 | 0;
                d = Math.floor(d / 16);
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
            return uuid;
        }
        
        // ============ 发送消息 ============
        function sendMessage() {
            if (isSending) return;
            if (!isConnected) {
                addSystemMsg('⚠️ 未连接，请先连接到 Gateway', false);
                return;
            }
            
            var text = inputEl.value.trim();
            if (!text) return;
            
            // 清空输入，但不预先显示用户消息
            // 用户消息将由 chat 事件触发显示（确保进入 session 系统）
            inputEl.value = '';
            
            // 发送到 Gateway
            sendChatMessage(text);
        }
        
        function sendChatMessage(text) {
            var req = {
                type: 'req',
                id: 'req-' + (++requestId),
                method: 'chat.send',
                params: {
                    sessionKey: sessionKey,
                    text: text,
                    idempotencyKey: generateUUID()
                }
            };
            
            pendingRequests[req.id] = {
                type: 'chat.send',
                timestamp: Date.now(),
                userText: text  // 保存用户消息以便失败时显示
            };
            
            isSending = true;
            sendBtn.disabled = true;
            setStatus('loading', '发送中...');
            
            console.log('[chat.send]', JSON.stringify(req));
            
            try {
                ws.send(JSON.stringify(req));
            } catch(e) {
                isSending = false;
                sendBtn.disabled = false;
                setStatus('error', '发送失败: ' + e.message);
                addSystemMsg('❌ 发送失败: ' + e.message, true);
            }
        }
        
        // ============ 加载历史 ============
        function loadHistory() {
            var req = {
                type: 'req',
                id: 'history-' + (++requestId),
                method: 'chat.history',
                params: {
                    sessionKey: sessionKey
                }
            };
            
            pendingRequests[req.id] = {
                type: 'chat.history',
                timestamp: Date.now()
            };
            
            try {
                ws.send(JSON.stringify(req));
            } catch(e) {
                console.error('Failed to load history:', e);
            }
        }
        
        function mergeHistory(serverMessages) {
            if (!serverMessages || serverMessages.length === 0) return;
            
            // 简单合并：如果本地没有历史，直接使用服务端历史
            // 否则保留本地历史（避免重复）
            if (messages.length === 0) {
                for (var i = 0; i < serverMessages.length; i++) {
                    var msg = serverMessages[i];
                    var content = extractTextContent(msg.content);
                    if (content) {
                        messages.push({
                            role: msg.role,
                            content: content
                        });
                    }
                }
                renderAllMessages();
                saveLocalHistory();
            }
        }
        
        function extractTextContent(content) {
            if (typeof content === 'string') {
                return content;
            }
            if (content && content.length) {
                var text = '';
                for (var i = 0; i < content.length; i++) {
                    var block = content[i];
                    if (block.type === 'text' && block.text) {
                        text += block.text;
                    }
                }
                return text;
            }
            return '';
        }
        
        // ============ 从服务端加载历史（通过 HTTP API）============
        function loadHistoryFromServer() {
            // 使用 HTTP API /tools/invoke 获取历史
            var httpUrl = wsUrl.replace(/^ws/, 'http');
            var apiUrl = httpUrl + '/tools/invoke';
            
            setStatus('loading', '正在加载历史...');
            
            var body = {
                tool: 'sessions_history',
                args: {
                    sessionKey: 'agent:' + agentId + ':' + sessionKey,
                    limit: 100
                }
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', apiUrl, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            if (gatewayToken) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + gatewayToken);
            }
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            var serverMsgs = null;
                            
                            if (resp.result && resp.result.messages) {
                                serverMsgs = resp.result.messages;
                            } else if (resp.messages) {
                                serverMsgs = resp.messages;
                            } else if (resp.result && resp.result.content) {
                                for (var k = 0; k < resp.result.content.length; k++) {
                                    var block = resp.result.content[k];
                                    if (block.type === 'text' && block.text) {
                                        try {
                                            var innerData = JSON.parse(block.text);
                                            if (innerData.messages) {
                                                serverMsgs = innerData.messages;
                                                break;
                                            }
                                        } catch(parseErr) {}
                                    }
                                }
                            }
                            
                            if (serverMsgs) {
                                messages = [];
                                for (var i = 0; i < serverMsgs.length; i++) {
                                    var msg = serverMsgs[i];
                                    var content = extractTextContent(msg.content);
                                    if (content && content.trim()) {
                                        messages.push({
                                            role: msg.role,
                                            content: content.trim()
                                        });
                                    }
                                }
                                renderAllMessages();
                                saveLocalHistory();
                                setStatus(isConnected ? 'ok' : 'error', '已加载 ' + messages.length + ' 条消息');
                            } else {
                                setStatus(isConnected ? 'ok' : 'error', '加载失败: 无法解析响应');
                            }
                        } catch(e) {
                            setStatus(isConnected ? 'ok' : 'error', '解析失败: ' + e.message);
                        }
                    } else {
                        setStatus(isConnected ? 'ok' : 'error', 'HTTP ' + xhr.status);
                    }
                }
            };
            
            xhr.onerror = function() {
                setStatus(isConnected ? 'ok' : 'error', '网络错误');
            };
            
            xhr.timeout = 30000;
            
            try {
                xhr.send(JSON.stringify(body));
            } catch(e) {
                setStatus(isConnected ? 'ok' : 'error', '请求失败: ' + e.message);
            }
        }
        
        // ============ Markdown 渲染 ============
        function renderMarkdown(text) {
            if (!text) return '';
            
            // 转义 HTML
            var html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // 代码块 ```code```
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });
            
            // 行内代码 `code`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // 粗体 **text**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // 斜体 *text*
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // 链接 [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // 引用 > text
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // 无序列表 - item
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // 有序列表 1. item
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            return html;
        }
        
        // ============ 消息显示 ============
        function addMessage(role, content) {
            messages.push({role: role, content: content});
            saveLocalHistory();
            renderMessage(role, content);
        }
        
        function renderMessage(role, content, isStreaming) {
            isStreaming = isStreaming || false;
            
            var div = document.createElement('div');
            div.className = 'msg msg-' + role;
            
            var senderDiv = document.createElement('div');
            senderDiv.className = 'msg-sender';
            senderDiv.textContent = role === 'user' ? '你' : (role === 'assistant' ? 'AI' : '系统');
            
            var contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            
            // 使用 innerHTML 渲染 Markdown
            contentDiv.innerHTML = renderMarkdown(content);
            
            // 流式时添加光标
            if (isStreaming) {
                var cursor = document.createElement('span');
                cursor.className = 'streaming-cursor';
                cursor.id = 'streamingCursor';
                contentDiv.appendChild(cursor);
            }
            
            div.appendChild(senderDiv);
            div.appendChild(contentDiv);
            messagesEl.appendChild(div);
            
            // 滚动到底部
            messagesEl.scrollTop = messagesEl.scrollHeight;
            
            return contentDiv;
        }
        
        function updateLastMessage(content) {
            // 更新最后一条 AI 消息
            var lastMsg = messagesEl.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('msg-assistant')) {
                var contentDiv = lastMsg.querySelector('.msg-content');
                if (contentDiv) {
                    contentDiv.innerHTML = renderMarkdown(content);
                    // 重新添加光标
                    var cursor = document.createElement('span');
                    cursor.className = 'streaming-cursor';
                    cursor.id = 'streamingCursor';
                    contentDiv.appendChild(cursor);
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            }
        }
        
        function finishStreaming() {
            var cursor = document.getElementById('streamingCursor');
            if (cursor) cursor.remove();
        }
        
        function renderAllMessages() {
            messagesEl.innerHTML = '';
            for (var i = 0; i < messages.length; i++) {
                renderMessage(messages[i].role, messages[i].content);
            }
        }
        
        function saveLocalHistory() {
            try {
                localStorage.setItem('oc_messages', JSON.stringify(messages));
            } catch(e) {}
        }
        
        function loadLocalHistory() {
            try {
                var saved = localStorage.getItem('oc_messages');
                if (saved) {
                    messages = JSON.parse(saved);
                    renderAllMessages();
                }
            } catch(e) {
                messages = [];
            }
        }
        
        function clearHistory() {
            var btn = event && event.target ? event.target : document.activeElement;
            
            if (btn && btn.getAttribute('data-confirm') === '1') {
                // 已确认，执行清除
                messages = [];
                saveLocalHistory();
                messagesEl.innerHTML = '';
                btn.textContent = '清除历史';
                btn.removeAttribute('data-confirm');
                setStatus(isConnected ? 'ok' : 'error', '已清除聊天记录');
                return false;
            }
            
            // 首次点击，请求确认
            if (btn) {
                btn.textContent = '⚠️ 确认清除？再点一次';
                btn.setAttribute('data-confirm', '1');
                // 3秒后自动恢复
                setTimeout(function() {
                    if (btn.getAttribute('data-confirm') === '1') {
                        btn.textContent = '清除历史';
                        btn.removeAttribute('data-confirm');
                    }
                }, 3000);
            }
            return false;
        }
        
        function addSystemMsg(text, showRetry) {
            var div = document.createElement('div');
            div.className = 'msg msg-system';
            div.id = 'lastSystemMsg';
            
            var contentSpan = document.createElement('span');
            contentSpan.id = 'systemMsgText';
            contentSpan.textContent = text;
            div.appendChild(contentSpan);
            
            // 添加重试按钮
            if (showRetry) {
                var retryBtn = document.createElement('button');
                retryBtn.className = 'btn btn-outline';
                retryBtn.style.cssText = 'margin-left:10px;padding:4px 12px;font-size:14px;';
                retryBtn.textContent = '🔄 重试';
                retryBtn.onclick = function() {
                    // 移除系统消息
                    div.remove();
                    // 重新连接
                    connectWebSocket();
                };
                div.appendChild(retryBtn);
            }
            
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        function handleKey(e) {
            if (e.keyCode === 13 && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // 启动
        inputEl.focus();
    </script>
</body>
